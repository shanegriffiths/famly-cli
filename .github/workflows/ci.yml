name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: test (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v7
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install (editable, with dev deps)
        run: pip install -e ".[dev]"
      - name: Run tests
        run: python -m pytest -q

  install-smoke:
    name: install smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v7
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install the built package
        run: pip install .
      - name: Run the CLI from outside the source tree
        working-directory: ${{ runner.temp }}
        shell: bash
        run: |
          set -euo pipefail
          famly --version
          famly --help
          # confirm the .graphql package-data was bundled into the install
          python -c "from famly.auth import _query; assert _query('Authenticate').strip(); print('graphql package-data OK')"
